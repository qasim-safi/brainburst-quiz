<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="BrainBurst – A fast-paced neon quiz game. Test your knowledge in General, Technology, and Science with time-based scoring and high scores." />
  <title>BrainBurst 🧠 | Neon Knowledge Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Particle canvas -->
  <canvas id="particleCanvas" aria-hidden="true"></canvas>

  <!-- Screens -->
  <div class="screen-wrap">

    <!-- ── Screen 1: Home ── -->
    <div id="homeScreen" class="screen active" role="main">
      <div class="home-glow" aria-hidden="true"></div>
      <div class="home-content">
        <div class="logo-wrap">
          <span class="logo-brain" aria-hidden="true">🧠</span>
          <h1 class="logo-title">BrainBurst</h1>
          <p class="logo-sub">How much do you really know?</p>
        </div>

        <div class="category-grid" role="list" aria-label="Select a category">
          <button class="cat-card" onclick="startQuiz('general')" id="btn-general" role="listitem">
            <span class="cat-emoji" aria-hidden="true">🌍</span>
            <span class="cat-name">General</span>
            <span class="cat-count">10 Questions</span>
          </button>
          <button class="cat-card" onclick="startQuiz('tech')" id="btn-tech" role="listitem">
            <span class="cat-emoji" aria-hidden="true">💻</span>
            <span class="cat-name">Technology</span>
            <span class="cat-count">10 Questions</span>
          </button>
          <button class="cat-card" onclick="startQuiz('science')" id="btn-science" role="listitem">
            <span class="cat-emoji" aria-hidden="true">🔬</span>
            <span class="cat-name">Science</span>
            <span class="cat-count">10 Questions</span>
          </button>
          <button class="cat-card cat-all" onclick="startQuiz('all')" id="btn-all" role="listitem">
            <span class="cat-emoji" aria-hidden="true">⚡</span>
            <span class="cat-name">All Topics</span>
            <span class="cat-count">30 Questions</span>
          </button>
        </div>

        <div class="highscore-panel" id="highscorePanel">
          <p class="hs-label">🏆 High Scores</p>
          <div id="hsList" class="hs-list"></div>
        </div>
      </div>
    </div>

    <!-- ── Screen 2: Quiz ── -->
    <div id="quizScreen" class="screen" aria-live="polite">
      <div class="quiz-topbar">
        <button class="quit-btn" onclick="quitQuiz()" id="quitBtn" aria-label="Quit quiz">✕ Quit</button>
        <div class="quiz-meta">
          <span class="q-counter" id="qCounter">Q 1 / 10</span>
          <span class="cat-badge" id="catBadge">General</span>
        </div>
        <div class="score-display">
          <span class="score-label">Score</span>
          <span class="score-val" id="scoreVal">0</span>
        </div>
      </div>

      <!-- Timer ring -->
      <div class="timer-wrap" aria-label="Time remaining">
        <svg class="timer-ring" viewBox="0 0 120 120">
          <circle class="timer-bg" cx="60" cy="60" r="52" />
          <circle class="timer-fill" id="timerCircle" cx="60" cy="60" r="52"
                  stroke-dasharray="326.73" stroke-dashoffset="0" />
        </svg>
        <div class="timer-inner">
          <span id="timerNum" class="timer-num">30</span>
          <span class="timer-sec">sec</span>
        </div>
      </div>

      <!-- Question -->
      <div class="question-card" id="questionCard">
        <p class="question-text" id="questionText">—</p>
      </div>

      <!-- Answer options -->
      <div class="answers-grid" id="answersGrid" role="list" aria-label="Answer options">
        <button class="answer-btn" id="ans-0" onclick="selectAnswer(0)" role="listitem">—</button>
        <button class="answer-btn" id="ans-1" onclick="selectAnswer(1)" role="listitem">—</button>
        <button class="answer-btn" id="ans-2" onclick="selectAnswer(2)" role="listitem">—</button>
        <button class="answer-btn" id="ans-3" onclick="selectAnswer(3)" role="listitem">—</button>
      </div>

      <!-- Progress bar -->
      <div class="q-progress-track" aria-label="Quiz progress">
        <div class="q-progress-fill" id="qProgressFill"></div>
      </div>
    </div>

    <!-- ── Screen 3: Results ── -->
    <div id="resultScreen" class="screen" aria-live="assertive">
      <canvas id="confettiCanvas" aria-hidden="true"></canvas>
      <div class="result-content">
        <div class="result-trophy" id="resultTrophy" aria-hidden="true">🏆</div>
        <h2 class="result-title" id="resultTitle">Quiz Complete!</h2>
        <p class="result-sub" id="resultSub">—</p>

        <div class="result-stats">
          <div class="rs-card">
            <span class="rs-val" id="rsFinal">0</span>
            <span class="rs-lbl">Final Score</span>
          </div>
          <div class="rs-card">
            <span class="rs-val" id="rsCorrect">0/0</span>
            <span class="rs-lbl">Correct</span>
          </div>
          <div class="rs-card">
            <span class="rs-val" id="rsAccuracy">0%</span>
            <span class="rs-lbl">Accuracy</span>
          </div>
        </div>

        <div class="result-badge" id="resultBadge"></div>

        <div class="result-actions">
          <button class="res-btn res-primary" onclick="retryQuiz()" id="retryBtn">🔄 Play Again</button>
          <button class="res-btn res-secondary" onclick="goHome()" id="homeBtn">🏠 Home</button>
        </div>
      </div>
    </div>

  </div><!-- end screen-wrap -->

  <script src="script.js"></script>
</body>
</html>
